name: Deploy to GitHub Pages

# main が更新されたら gh-pages ブランチへ内容を同期する。
# GitHub Pages のソースは gh-pages ブランチ（初回作成時に自動で有効化される）。
# ※ actions/configure-pages の enablement は GITHUB_TOKEN の権限では
#   Pagesサイトを新規作成できないため、ブランチ方式を採用している。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
